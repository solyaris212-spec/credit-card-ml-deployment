# Простая конфигурация nginx для имитации сервиса мониторинга логов
server {
    listen 80;
    server_name localhost;

    location /logs {
        # Раздаем логи ML-сервиса
        alias /var/log/ml-service;
        autoindex on;  # Показываем список файлов
        default_type application/json;
    }

    location / {
        return 200 '{"service": "log-collector", "status": "running", "note": "В production здесь был бы ELK-стек или Grafana+Loki"}';
        add_header Content-Type application/json;
    }
}