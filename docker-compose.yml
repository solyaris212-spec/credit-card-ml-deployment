# docker-compose.yml
# Оркестрация ML-сервиса и вспомогательных контейнеров

version: '3.8'

services:
  # === Основной ML-сервис ===
  ml-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: credit-card-ml-service
    ports:
      - "5000:5000"
    volumes:
      # Монтируем папку logs, чтобы логи сохранялись на хосте
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      # Проверка работоспособности через эндпоинт /health
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Имитация сервиса сбора логов (nginx) ===
  # В production здесь был бы Logstash или Filebeat,
  # отправляющий логи в Elasticsearch
  log-collector:
    image: nginx:alpine
    container_name: log-collector
    volumes:
      # Подключаем ту же папку logs, чтобы nginx "видел" логи ML-сервиса
      - ./logs:/var/log/ml-service:ro
      # Конфигурация nginx для раздачи логов (имитация дашборда)
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - ml-service
    restart: unless-stopped